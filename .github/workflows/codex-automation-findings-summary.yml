name: Codex Automation Findings Summary
# side-effects: Apply mode posts digest comments to the rolling automation issue; manual dispatch defaults to dry-run unless apply=true.

on:
  workflow_dispatch:
    inputs:
      apply:
        description: Apply mode (post digest comment to rolling issue)
        required: false
        default: false
        type: boolean
  workflow_run:
    workflows:
      - Codex Self Improvement
      - Codex PR Green Daily
    types:
      - completed

permissions:
  contents: read
  actions: read
  issues: write

concurrency:
  group: codex-automation-global
  cancel-in-progress: false

jobs:
  codex-findings-summary:
    if: ${{ github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion != 'skipped' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Run automation findings summary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CODEX_REPORT_MENTION: ${{ vars.CODEX_REPORT_MENTION }}
          STUDIO_BRAIN_BASE_URL: ${{ vars.STUDIO_BRAIN_BASE_URL }}
          STUDIO_BRAIN_AUTH_TOKEN: ${{ secrets.STUDIO_BRAIN_AUTH_TOKEN }}
          STUDIO_BRAIN_ADMIN_TOKEN: ${{ secrets.STUDIO_BRAIN_ADMIN_TOKEN }}
          OPEN_MEMORY_TENANT_ID: ${{ vars.OPEN_MEMORY_TENANT_ID }}
        run: |
          set -euo pipefail

          MODE="--apply"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.apply }}" != "true" ]; then
            MODE="--dry-run"
          fi

          node ./scripts/codex/automation-findings-summary.mjs ${MODE} --json

      - name: Upload automation findings summary artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: codex-automation-findings-summary-${{ github.run_id }}
          path: |
            output/qa/codex-automation-findings-summary.md
            output/qa/codex-automation-findings-summary.json
          if-no-files-found: ignore
          retention-days: 7
