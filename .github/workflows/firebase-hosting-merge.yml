# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
permissions:
  contents: read
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Resolve Firebase API key
        id: firebase_api_key
        env:
          FIREBASE_WEB_API_KEY: ${{ secrets.FIREBASE_WEB_API_KEY }}
          PORTAL_FIREBASE_API_KEY: ${{ secrets.PORTAL_FIREBASE_API_KEY }}
        run: node ./scripts/resolve-firebase-api-key.mjs --github-output --json
      - name: Build web bundle with validated Firebase API key
        shell: bash
        env:
          VITE_FIREBASE_API_KEY: ${{ steps.firebase_api_key.outputs.firebase_api_key }}
        run: |
          set -euo pipefail
          echo "Using Firebase API key source: ${{ steps.firebase_api_key.outputs.firebase_api_key_source }}"
          echo "VITE_FIREBASE_API_KEY=$VITE_FIREBASE_API_KEY" >> "$GITHUB_ENV"
          export VITE_FIREBASE_API_KEY
          npm --prefix web ci
          npm --prefix web run build
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MONSOONFIRE_PORTAL }}

      - name: Deploy live hosting
        shell: bash
        env:
          FIREBASE_TOOLS_VERSION: 15.14.0
        run: |
          set -euo pipefail
          npx --yes firebase-tools@"$FIREBASE_TOOLS_VERSION" deploy \
            --project monsoonfire-portal \
            --only hosting \
            --non-interactive
