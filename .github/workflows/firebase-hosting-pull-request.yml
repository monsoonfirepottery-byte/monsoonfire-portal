# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  issues: write
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    env:
      IS_DEPENDABOT_PR: ${{ github.event.pull_request.user.login == 'dependabot[bot]' }}
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Resolve Firebase API key
        id: firebase_api_key
        continue-on-error: ${{ env.IS_DEPENDABOT_PR == 'true' }}
        env:
          FIREBASE_WEB_API_KEY: ${{ secrets.FIREBASE_WEB_API_KEY }}
          PORTAL_FIREBASE_API_KEY: ${{ secrets.PORTAL_FIREBASE_API_KEY }}
        run: node ./scripts/resolve-firebase-api-key.mjs --github-output --json
      - name: Build web bundle with validated Firebase API key
        shell: bash
        env:
          IS_DEPENDABOT_PR: ${{ env.IS_DEPENDABOT_PR }}
          RESOLVED_FIREBASE_API_KEY: ${{ steps.firebase_api_key.outputs.firebase_api_key }}
          RESOLVED_FIREBASE_API_KEY_SOURCE: ${{ steps.firebase_api_key.outputs.firebase_api_key_source }}
        run: |
          set -euo pipefail

          selected_api_key="$RESOLVED_FIREBASE_API_KEY"
          selected_source="$RESOLVED_FIREBASE_API_KEY_SOURCE"

          if [ -z "$selected_api_key" ]; then
            if [ "$IS_DEPENDABOT_PR" = "true" ]; then
              selected_api_key="dependabot-ci-fallback-key"
              selected_source="dependabot-fallback"
              echo "Dependabot PR detected; using compile-only Firebase API key fallback."
            else
              echo "No valid Firebase web API key candidate resolved for web build." >&2
              exit 1
            fi
          fi

          echo "Using Firebase API key source: $selected_source"
          echo "VITE_FIREBASE_API_KEY=$selected_api_key" >> "$GITHUB_ENV"
          export VITE_FIREBASE_API_KEY="$selected_api_key"
          npm --prefix web ci
          npm --prefix web run build
      - name: Prune stale Firebase preview channels (best effort)
        if: ${{ env.IS_DEPENDABOT_PR != 'true' }}
        continue-on-error: true
        env:
          FIREBASE_SERVICE_ACCOUNT_MONSOONFIRE_PORTAL: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MONSOONFIRE_PORTAL }}
        run: node ./scripts/prune-firebase-preview-channels.mjs --project monsoonfire-portal --prefix pr --keep 20 --max-delete 80 --json
      - name: Authenticate to Google Cloud
        if: ${{ env.IS_DEPENDABOT_PR != 'true' }}
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MONSOONFIRE_PORTAL }}

      - name: Deploy preview channel
        if: ${{ env.IS_DEPENDABOT_PR != 'true' }}
        id: preview_deploy
        shell: bash
        env:
          FIREBASE_TOOLS_VERSION: 15.14.0
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          channel_id="pr-${PR_NUMBER}"
          deploy_log="$RUNNER_TEMP/firebase-preview-deploy.log"

          npx --yes firebase-tools@"$FIREBASE_TOOLS_VERSION" hosting:channel:deploy "$channel_id" \
            --project monsoonfire-portal \
            --expires 7d \
            --non-interactive 2>&1 | tee "$deploy_log"

          preview_url="$(grep -Eo 'https://[^[:space:]]*(web\.app|firebaseapp\.com)[^[:space:]]*' "$deploy_log" | tail -n 1)"
          if [ -z "$preview_url" ]; then
            echo "Unable to resolve preview URL from firebase-tools output." >&2
            exit 1
          fi

          echo "channel_id=$channel_id" >> "$GITHUB_OUTPUT"
          echo "preview_url=$preview_url" >> "$GITHUB_OUTPUT"

      - name: Upsert preview comment
        if: ${{ env.IS_DEPENDABOT_PR != 'true' }}
        uses: actions/github-script@v8
        env:
          PREVIEW_URL: ${{ steps.preview_deploy.outputs.preview_url }}
          CHANNEL_ID: ${{ steps.preview_deploy.outputs.channel_id }}
          COMMENT_MARKER: "<!-- firebase-hosting-preview -->"
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = process.env.COMMENT_MARKER;
            const previewUrl = process.env.PREVIEW_URL;
            const channelId = process.env.CHANNEL_ID;
            const issueNumber = context.payload.pull_request?.number;
            if (!issueNumber || !previewUrl || !channelId) {
              core.setFailed("Preview deploy outputs are missing.");
              return;
            }

            const body = [
              marker,
              "Firebase Hosting preview is ready.",
              "",
              `- Channel: \`${channelId}\``,
              `- Preview: ${previewUrl}`,
            ].join("\n");

            const { owner, repo } = context.repo;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: issueNumber,
              per_page: 100,
            });
            const existing = comments.find((comment) => {
              const commentBody = String(comment.body || "");
              return comment.user?.type === "Bot" && commentBody.includes(marker);
            });

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body,
              });
            }

      - name: Skip preview deploy for Dependabot PRs
        if: ${{ env.IS_DEPENDABOT_PR == 'true' }}
        run: echo "Dependabot PR detected; skipping Firebase preview deploy step."
