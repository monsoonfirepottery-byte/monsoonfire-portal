name: Governance Decision Capture

on:
  issue_comment:
    types:
      - created
      - edited
  pull_request_review:
    types:
      - submitted
      - edited

permissions:
  contents: read

concurrency:
  group: governance-decision-capture-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  capture-decision-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Capture human decision evidence
        run: |
          node ./scripts/governance/capture-human-decision-evidence.mjs \
            --event-path "$GITHUB_EVENT_PATH" \
            --output output/governance/human-decision-evidence.json

      - name: Upload decision evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governance-decision-capture-${{ github.run_id }}
          path: output/governance/human-decision-evidence.json
          if-no-files-found: ignore
          retention-days: 14
