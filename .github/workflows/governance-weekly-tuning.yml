name: Governance Weekly Tuning

on:
  schedule:
    - cron: "15 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  actions: read

concurrency:
  group: governance-weekly-tuning-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tune-governance-thresholds:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Build weekly tuning report (no apply)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node ./scripts/governance/weekly-tune-thresholds.mjs \
            --output output/governance/weekly-tune-report.json

      - name: Upload weekly tuning artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governance-weekly-tune-${{ github.run_id }}
          path: output/governance/weekly-tune-report.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Update governance rolling issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node ./scripts/governance/publish-weekly-tuning-issue.mjs \
            --report output/governance/weekly-tune-report.json \
            --output output/governance/weekly-tune-issue.json
