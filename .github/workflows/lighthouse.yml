name: Lighthouse Audit

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  issues: write

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web deps
        run: npm ci --prefix web

      - name: Build web app
        run: npm --prefix web run build

      - name: Run Lighthouse CI
        run: |
          rm -rf .lighthouseci
          npx @lhci/cli@0.15.1 collect --config=web/lighthouserc.json
          npx @lhci/cli@0.15.1 assert --config=web/lighthouserc.json

      - name: Run Lighthouse CI (website)
        run: |
          rm -rf .lighthouseci
          npx @lhci/cli@0.15.1 collect --config=website/lighthouserc.json
          npx @lhci/cli@0.15.1 assert --config=website/lighthouserc.json

      - name: Open rolling failure ticket
        if: ${{ failure() && github.event_name != 'pull_request' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node ./scripts/workflow-failure-ticket.mjs \
            --workflow-name "${{ github.workflow }}" \
            --run-id "${{ github.run_id }}" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --report output/qa/workflow-failure-ticket-lighthouse.json \
            --json