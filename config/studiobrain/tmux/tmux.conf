set -g mouse on
set -g history-limit 200000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g allow-rename off
set -g status-position top
set -g status-interval 30
set -g status-left-length 80
set -g status-right-length 120
set -g status-style fg=colour252,bg=colour235
set -g status-left "#[fg=colour235,bg=colour110,bold] #S #[default]"
set -g status-right "#[fg=colour245]browser-first control tower | tmux recovery | %Y-%m-%d %H:%M#[default]"
set -g message-style fg=colour223,bg=colour238
set -g pane-border-style fg=colour239
set -g pane-active-border-style fg=colour110
set -g window-status-style fg=colour246,bg=colour235
set -g window-status-current-style fg=colour235,bg=colour110,bold
set -g display-time 3000
set -g bell-action none
set -g visual-bell off
set -g visual-activity off
set -g monitor-activity off

bind-key C select-window -t :control
bind-key B select-window -t :brain
bind-key S select-window -t :scripts
bind-key L select-window -t :logs
bind-key T choose-tree -Zw
