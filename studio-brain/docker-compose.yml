services:
  postgres:
    image: ${STUDIO_BRAIN_POSTGRES_IMAGE:-pgvector/pgvector:pg16}
    container_name: studiobrain_postgres
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_DB: ${PGDATABASE:-monsoonfire_studio_os}
      POSTGRES_USER: ${PGUSER:-postgres}
      POSTGRES_PASSWORD: ${PGPASSWORD:-postgres}
    ports:
      - "${STUDIO_BRAIN_POSTGRES_BIND_HOST:-127.0.0.1}:${PGPORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-postgres} -d ${PGDATABASE:-monsoonfire_studio_os}"]
      interval: 5s
      timeout: 3s
      retries: 20
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          memory: 384M
    logging:
      driver: json-file
      options:
        max-size: 16m
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: studiobrain_redis
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command:
      - sh
      - -c
      - |
        if [ -n "$REDIS_PASSWORD" ]; then
          exec redis-server --save 60 1 --appendonly no --requirepass "$REDIS_PASSWORD";
        fi
        exec redis-server --save 60 1 --appendonly no
    ports:
      - "${STUDIO_BRAIN_REDIS_BIND_HOST:-127.0.0.1}:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "if [ -n \"$REDIS_PASSWORD\" ]; then redis-cli -a \"$REDIS_PASSWORD\" ping; else redis-cli ping; fi",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M
        reservations:
          memory: 192M
    logging:
      driver: json-file
      options:
        max-size: 8m
        max-file: "2"

  minio:
    image: minio/minio:latest
    container_name: studiobrain_minio
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      MINIO_ROOT_USER: ${STUDIO_BRAIN_ARTIFACT_STORE_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${STUDIO_BRAIN_ARTIFACT_STORE_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "${STUDIO_BRAIN_MINIO_BIND_HOST:-127.0.0.1}:${MINIO_API_PORT:-9010}:9000"
      - "${STUDIO_BRAIN_MINIO_BIND_HOST:-127.0.0.1}:${MINIO_CONSOLE_PORT:-9011}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          memory: 384M
    logging:
      driver: json-file
      options:
        max-size: 16m
        max-file: "3"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: studiobrain_otel_collector
    user: "0:0"
    restart: unless-stopped
    profiles: ["observability"]
    security_opt:
      - no-new-privileges:true
    command: ["--config", "/etc/otel/config.yaml"]
    volumes:
      - ./docker/otel-collector.yaml:/etc/otel/config.yaml:ro
      - ../output/otel:/var/log/otel
    ports:
      - "${STUDIO_BRAIN_OTEL_BIND_HOST:-127.0.0.1}:4317:4317"
      - "${STUDIO_BRAIN_OTEL_BIND_HOST:-127.0.0.1}:4318:4318"
      - "${STUDIO_BRAIN_OTEL_BIND_HOST:-127.0.0.1}:8889:8889"
    depends_on:
      - postgres
      - redis
      - minio
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: 8m
        max-file: "2"

volumes:
  postgres_data:
  minio_data:
